version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    environment:
      - APP_ENV=production
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=tis_gateway
      - DB_USERNAME=root
      - DB_PASSWORD=password
      - TIS_API_KEY=${TIS_API_KEY}
    depends_on:
      - db
    networks:
      - tis-network

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: tis_gateway
      MYSQL_ROOT_PASSWORD: password
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - tis-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - tis-network

volumes:
  db_data:

networks:
  tis-network:
    driver: bridge